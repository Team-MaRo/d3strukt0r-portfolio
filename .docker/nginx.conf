server {
  listen       80;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # Security / sanity headers.
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # gzip (brotli would need nginx-plus / custom image).
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/xml application/xml application/xml+rss
             application/javascript application/json image/svg+xml
             application/atom+xml;

  # Fingerprinted assets — safe to cache forever.
  location /assets/ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SEO / feed artifacts with explicit content types.
  location = /atom.xml    { types {} default_type application/atom+xml; }
  location = /sitemap.xml { types {} default_type application/xml; }
  location = /robots.txt  { types {} default_type text/plain; }

  # SPA fallback — client router take over for unknown paths.
  location / {
    try_files $uri $uri/ /index.html;
  }

  error_page 404 /404.html;
}
