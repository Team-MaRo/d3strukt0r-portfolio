services:
  dev:
    image: nixos/nix:2.34.6
    working_dir: /opt/d3strukt0rs-portfolio
    command:
      - nix
      - --extra-experimental-features
      - nix-command flakes
      - develop
      - --command
      - sh
      - -c
      - pnpm install && pnpm run dev --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - .:/opt/d3strukt0rs-portfolio
      - node_modules:/opt/d3strukt0rs-portfolio/node_modules
      # Persist the nix store across container restarts so devShell realisation
      # only happens once.
      - nix-store:/nix
    environment:
      NODE_ENV: development

volumes:
  node_modules:
  nix-store:
