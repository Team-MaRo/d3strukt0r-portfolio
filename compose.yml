services:
  dev:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm run dev --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - BUILD_TARGET=docker

volumes:
  node_modules:
