services:
  dev:
    build:
      context: .
      target: base
    working_dir: /app
    command: sh -c "pnpm install && pnpm run dev --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      NODE_ENV: development

volumes:
  node_modules:
