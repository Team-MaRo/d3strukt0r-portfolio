---
layout: default
---

<div id="ta-root">{{ content }}</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="{{ '/assets/js/portfolio/content.js' | relative_url }}"></script>
<script>
  // Inject real Jekyll posts into the bilingual content blob before React mounts.
  window.PORTFOLIO_CONTENT = window.PORTFOLIO_CONTENT || {};
  window.PORTFOLIO_CONTENT.blog = [
    {% for p in site.posts limit:3 %}
    { title: { en: {{ p.title | jsonify }}, de: {{ p.title | jsonify }} },
      date:  {{ p.date | date: "%Y-%m-%d" | jsonify }},
      url:   {{ p.url | relative_url | jsonify }} }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];
  window.PORTFOLIO_CONTENT.blogUrl = {{ '/archive/' | relative_url | jsonify }};
</script>
<script type="text/babel" src="{{ '/assets/js/portfolio/hooks.jsx' | relative_url }}"></script>
<script type="text/babel" src="{{ '/assets/js/portfolio/terminal.jsx' | relative_url }}"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('ta-root')).render(<TerminalAurora />);
</script>
