name: CI

on:
  push:
    branches: [master, develop]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm run lint

      - name: Run type checking
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
        env:
          # CI is a build smoke test — the bundle is never uploaded or
          # shipped. Use a throwaway placeholder so the seal plugin's strict
          # check passes without depending on repo secrets (PRs from forks
          # don't have access to them, and CI != deploy anyway). Any 32-byte
          # base64 string works; this is 32 zero bytes.
          SEAL_DATA_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
