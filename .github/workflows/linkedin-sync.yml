name: Sync LinkedIn → content/linkedin/

# Pulls fresh LinkedIn DMA data weekly and commits any diff under
# content/linkedin/ to `develop`. Pushing to `develop` (not `master`)
# keeps the weekly sync out of the release-please PR on `master` —
# releases stay a deliberate act. The push fires docker.yml on develop
# so the dev OCI image picks up fresh data; the live site
# (deploy-gh-pages.yml, master-only) won't redeploy until the next
# develop→master release. Back-to-back identical sync commits are
# squashed into one to keep develop's history clean. If the API call
# fails (token expired, version rejected, network error) the script
# exits non-zero, this workflow turns red, and the existing YAMLs stay
# intact — no destructive partial writes.
# See docs/linkedin-data-portability.md.

on:
  schedule:
    - cron: '30 9 * * 1' # Mondays 09:30 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: linkedin-sync
  cancel-in-progress: false

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: develop
          # Need HEAD~1 so the squash-with-previous check can read its subject.
          fetch-depth: 2
          # PAT so the resulting push fires docker.yml downstream.
          token: ${{ secrets.GH_PAT }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm ci

      # The sync script invokes `node --env-file=.env` so .env must exist on
      # disk. Write a throwaway one from the secret; .env is gitignored so
      # there's nothing to leak.
      - name: Write throwaway .env
        env:
          LINKEDIN_DMA_TOKEN: ${{ secrets.LINKEDIN_DMA_TOKEN }}
        run: printf 'LINKEDIN_DMA_TOKEN=%s\n' "$LINKEDIN_DMA_TOKEN" > .env

      - name: Sync
        run: pnpm run sync:linkedin:api

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          if git diff --quiet content/linkedin/; then
            echo "No changes."
            exit 0
          fi
          MSG="chore: sync LinkedIn snapshot"
          git add content/linkedin/
          git commit -m "$MSG"
          # If the immediately-preceding commit on develop was also a sync
          # (nothing else landed since), squash the two into one. Otherwise
          # push normally. --force-with-lease aborts if anything else pushed
          # to develop between our reset and push, so we can't clobber work.
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1 \
             && [ "$(git log -1 --skip=1 --format=%s)" = "$MSG" ]; then
            git reset --soft HEAD~2
            git commit -m "$MSG"
            git push --force-with-lease origin HEAD:develop
          else
            git push origin HEAD:develop
          fi

      # GitHub auto-disables scheduled workflows after 60 days of repo
      # inactivity. If develop's tip is older than KEEPALIVE_THRESHOLD_DAYS,
      # push an empty commit so this workflow stays armed even when the
      # LinkedIn API returns no diffs for a long stretch.
      - name: Keepalive (prevent workflow auto-disable)
        env:
          KEEPALIVE_THRESHOLD_DAYS: '50'
          KEEPALIVE_MESSAGE: 'chore: keepalive'
        run: |
          set -euo pipefail
          LAST_COMMIT_EPOCH=$(git log -1 --pretty=%ct)
          AGE_DAYS=$(( ( $(date +%s) - LAST_COMMIT_EPOCH ) / 86400 ))
          if (( AGE_DAYS < KEEPALIVE_THRESHOLD_DAYS )); then
            echo "last commit ${AGE_DAYS}d ago (< ${KEEPALIVE_THRESHOLD_DAYS}d threshold) — no keepalive needed"
            exit 0
          fi
          echo "last commit ${AGE_DAYS}d ago — pushing keepalive commit"
          git commit --allow-empty -m "$KEEPALIVE_MESSAGE"
          git push origin HEAD:develop
