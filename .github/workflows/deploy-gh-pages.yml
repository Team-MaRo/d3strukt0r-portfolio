name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm ci

      - name: Setup Pages
        uses: actions/configure-pages@v6

      # Single source of truth for the deployed hostname — Settings → Pages →
      # Custom domain. Failing fast here surfaces a misconfigured repo before
      # the build emits sitemap.xml / atom.xml with the wrong URL.
      - name: Resolve Pages hostname
        id: pages_cname
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CNAME=$(gh api "repos/${{ github.repository }}/pages" --jq '.cname')
          if [ -z "$CNAME" ] || [ "$CNAME" = "null" ]; then
            echo "::error::Pages API returned no custom domain. Set one in Settings → Pages → Custom domain."
            exit 1
          fi
          echo "site_host=$CNAME" >> "$GITHUB_OUTPUT"

      - name: Build
        run: pnpm run build
        env:
          SSR: 'false'
          SITE_HOST: ${{ steps.pages_cname.outputs.site_host }}
          SEAL_DATA_KEY: ${{ secrets.SEAL_DATA_KEY }}
          REVEAL_PASSWORDS: ${{ secrets.REVEAL_PASSWORDS }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: build/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
