allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: true
  workerd: true

# `@iwf-web/tsconfig/react-strict/tsconfig.json` extends three @tsconfig/*
# bases. tsc follows the @iwf-web/tsconfig symlink and resolves them inside
# the .pnpm subtree, but typescript-eslint's parser resolves against the
# symlink path and can't see them there. Public-hoisting them puts a
# top-level symlink in node_modules/@tsconfig/* so both resolvers agree.
publicHoistPattern:
  - "@tsconfig/*"

overrides:
  # GHSA path-traversal in the dev server (esbuild >= 0.27.3 < 0.28.1); pulled
  # transitively at 0.27.3/0.27.7/0.28.0. Force the patched release.
  esbuild: '>=0.28.1'
  gray-matter>js-yaml: '>=3.14.2 <4'

auditConfig:
  ignoreGhsas:
    # js-yaml merge-key quadratic DoS — only fixed in js-yaml >=4.1.2, but
    # gray-matter@4 requires the js-yaml 3.x API (`safeLoad`), so its transitive
    # js-yaml can't move off 3.x. Only reached at build time to parse our own
    # trusted blog-post frontmatter (no untrusted YAML, no merge-key aliases),
    # so the DoS isn't exploitable here. Drop once gray-matter ships on js-yaml 4.
    - GHSA-h67p-54hq-rp68
