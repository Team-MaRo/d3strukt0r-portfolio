# Grype configuration. Auto-discovered by `grype` when invoked from this
# directory, so ci.yml's vulnerability scan step picks it up without needing
# an explicit `--config` flag.
#
# Each ignore entry should record WHY the vulnerability is not actionable so
# a future reader can audit the suppression. Remove the entry as soon as the
# upstream fix lands in our nixpkgs channel (currently `nixos-25.11`).

ignore:
  # CVE-2025-70873 — sqlite ≤ 3.51.1: heap-memory information disclosure in
  # `zipfileInflate` of the `zipfile` virtual-table extension. Triggered only
  # by `SELECT ... FROM zipfile(<attacker-controlled blob>)`.
  #
  # Why ignored:
  #   - This is a static portfolio site. Application code does not import
  #     `node:sqlite`, doesn't open any database, and never invokes the
  #     zipfile extension.
  #   - sqlite is in the runtime closure only because `nodejs-slim` retains a
  #     reference to `sqlite-*-dev` (pkgconfig + headers) — Node's built-in
  #     `node:sqlite` module statically links sqlite into the `node` binary,
  #     so the standalone sqlite shared library isn't loaded at runtime.
  #
  # Remove this entry when `nixos-25.11` backports sqlite 3.51.2+. Check via:
  #   nix eval --raw github:NixOS/nixpkgs/nixos-25.11#sqlite.version
  - vulnerability: CVE-2025-70873

  # CVE-2026-5773 / 6276 / 5545 / 7168 / 6253 / 6429 / 4873 / 7009 — curl
  # 8.19.0 issues, all fixed in curl 8.20.0. Reported by Grype because
  # nixos-25.11 has not yet backported the 8.20.0 release.
  #
  # Why ignored:
  #   - curl is in the image only to back the OCI HEALTHCHECK CMD
  #     `curl -fsS http://localhost:3000/` (flake.nix `Healthcheck.Test`).
  #     All inputs are static and trusted: literal localhost URL, no
  #     attacker influence over arguments, protocol, headers, or
  #     response body.
  #   - The container runs as `nonroot:65532` with port 3000 as the only
  #     advertised ingress; curl never makes outbound calls to attacker-
  #     reachable hosts.
  #   - `curlSlim` (flake.nix `pkgs.curl.override`) disables scp, gss,
  #     psl, brotli, zstd, ldap, rtmp, http3, and websocket support —
  #     eliminating the protocol/parser surface most curl CVEs target.
  #
  # Remove these entries when `nixos-25.11` backports curl 8.20.0+. Check via:
  #   nix eval --raw github:NixOS/nixpkgs/nixos-25.11#curl.version
  - vulnerability: CVE-2026-5773
  - vulnerability: CVE-2026-6276
  - vulnerability: CVE-2026-5545
  - vulnerability: CVE-2026-7168
  - vulnerability: CVE-2026-6253
  - vulnerability: CVE-2026-6429
  - vulnerability: CVE-2026-4873
  - vulnerability: CVE-2026-7009
