- title: Persönliche Portfolio- und CV-Website
  description: >-
    Aus einer Codebase werden zwei Auslieferungsvarianten erzeugt: ein statisches SPA via GitHub
    Pages und ein SSR-fähiges, Nix-gebautes OCI-Image auf Docker Hub für Self-Hosting.  Tech-Stack:
    React 19 · React Router v7 (Framework Mode) · TypeScript · Vite 8 · Tailwind v4 + Sass ·
    react-i18next (DE/EN) · Node 24 · pnpm · Nix Flakes · Docker  Highlights: • Eigenes
    Design-System „Terminal Aurora" – Glassmorphism, JetBrains Mono, Custom-Cursor,
    Dark-/Light-Toggle und Terminal-Easter-Egg (sudo-Befehle). • Passwortgeschütztes „Sealed
    Content"-System: PII (Arbeitgeber, Zertifikate, Profilfoto) wird zur Build-Zeit per AES-GCM +
    PBKDF2 (600k Iterationen) verschlüsselt – das deployte Bundle enthält ausschliesslich
    Chiffretext. • Reproduzierbares OCI-Image komplett ohne Dockerfile, gebaut aus einer Nix-Flake
    mit minimalem Runtime-Closure (~250 MB). • Multi-Arch-CI-Pipeline (amd64/arm64/riscv64) mit
    Cosign-Signaturen, SPDX-SBOM-Attestierung und Grype-Vulnerability-Scanning. • Automatisierter
    LinkedIn-Daten-Sync (Member Data Portability API) generiert die Lebenslauf-Inhalte direkt in den
    Build. • Markdown-Blog mit Shiki-Syntax-Highlighting, Footnotes und Token-Expansion zur
    Build-Zeit. • Release-Please-Workflow mit Conventional Commits für automatisierte Versionierung
    und Changelogs.
