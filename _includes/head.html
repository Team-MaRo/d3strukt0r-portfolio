<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>
    {% if page.title == "Home" %}{{ site.title }}{% if site.tagline %} &middot; {{ site.tagline }}{% endif %}
    {% else %}{{ page.title }} &middot; {{ site.title }}{% endif %}
  </title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />

  <link rel="shortcut icon" href="{{ '/assets/favicon.ico' | relative_url }}" />
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/icons/apple-touch-icon.png?v=Gv627yJeoW' | relative_url }}" />
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/icons/favicon-32x32.png?v=Gv627yJeoW' | relative_url }}" />
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/icons/favicon-16x16.png?v=Gv627yJeoW' | relative_url }}" />
  <link rel="manifest" href="{{ '/assets/icons/site.webmanifest?v=Gv627yJeoW' | relative_url }}" />
  <link rel="mask-icon" href="{{ '/assets/icons/safari-pinned-tab.svg?v=Gv627yJeoW' | relative_url }}" color="#22d3ee" />
  <meta name="msapplication-TileColor" content="#0b0b1e" />
  <meta name="msapplication-config" content="{{ '/assets/icons/browserconfig.xml?v=Gv627yJeoW' | relative_url }}" />
  <meta name="theme-color" content="#060614" />

  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ 'atom.xml' | relative_url }}" />

  {% seo title=false %}
</head>
